    function getFormattedKstTime() {
      // (1) UTC 시간 계산 (브라우저 시간대 오프셋 제거)
      const now = new Date();
      const utc = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
      // (2) KST(UTC+9)로 변환
      const kstGap = 9 * 60 * 60 * 1000;
      const kstDate = new Date(utc + kstGap);

      const year = kstDate.getFullYear();
      const month = String(kstDate.getMonth() + 1).padStart(2, '0');
      const day = String(kstDate.getDate()).padStart(2, '0');
      const hour = String(kstDate.getHours()).padStart(2, '0');
      const minute = String(kstDate.getMinutes()).padStart(2, '0');
      const second = String(kstDate.getSeconds()).padStart(2, '0');

      // ********** 변경된 부분: 백틱 대신 + 기호 사용 **********
      const formattedDate = year + '-' + month + '-' + day;
      
      // ISO 8601 형식 (검색엔진이 가장 좋아하는 표준 포맷)
      // ********** 변경된 부분: 백틱 대신 + 기호 사용 **********
      const isoDateTime = year + '-' + month + '-' + day + 'T' + hour + ':' + minute + ':' + second + '+09:00';

      script.textContent = JSON.stringify(jsonLdData, null, 2);
    }
